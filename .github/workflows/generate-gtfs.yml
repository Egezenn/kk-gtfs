name: Generate GTFS Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *" # First day of every month at 00:00 UTC (03:00 UTC+3)

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run GTFS Generator
        run: uv run kk-gtfs.py --force

      - name: Generate Metadata
        run: uv run scripts/generate_metadata.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated GTFS data and metadata update"
          file_pattern: "data/*.zip data/metadata.json data/cities/**"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download GTFS Validator
        run: curl -sSL https://github.com/MobilityData/gtfs-validator/releases/download/v7.1.0/gtfs-validator-7.1.0-cli.jar -o gtfs-validator.jar

      - name: Validate GTFS Feeds
        run: |
          mkdir -p validation-reports
          for file in data/*.zip; do
            basename=$(basename "$file" .zip)
            echo "Validating $file..."
            java -jar gtfs-validator.jar -i "$file" -o "validation-reports/$basename"
          done

      - name: Upload Validation Reports
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-validation-reports
          path: validation-reports/

      - name: Trigger Map Deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-map.yml
