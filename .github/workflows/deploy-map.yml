name: Deploy map to GitHub Pages

on:
  push:
    paths:
      - "map/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject Timestamp into Service Worker Cache
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d_%H%M")
          sed -i "s/const CACHE_NAME = \"kk-gtfs-v1\";/const CACHE_NAME = \"kk-gtfs-v1-${TIMESTAMP}\";/" map/sw.js
          sed -i "s/const DATA_CACHE_NAME = \"kk-gtfs-data-v1\";/const DATA_CACHE_NAME = \"kk-gtfs-data-v1-${TIMESTAMP}\";/" map/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
